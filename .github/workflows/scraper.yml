name: Valorant Scraper

permissions:
  contents: write

on:
  schedule:
    - cron: '0 3 * * 2'  # Executa toda terça-feira às 03:00 (UTC)
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar bibliotecas
        run: |
          pip install requests beautifulsoup4 pandas lxml

      - name: Rodar scraper
        run: python scraper.py  

      - name: Commit CSV atualizado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add vlr_matches_raw.csv  # O nome do arquivo CSV gerado pelo scraper

          if git diff --cached --quiet; then
            echo "Nenhuma mudança no dataset"
          else
            git commit -m "update dataset"
            git pull --rebase
            git push
          fi
